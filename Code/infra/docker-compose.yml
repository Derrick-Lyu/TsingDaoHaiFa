name: ${COMPOSE_PROJECT_NAME:-qingdao-haifa}

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  backend:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      APP_NAME: ${APP_NAME:-tsingdao-haifa-api}
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tsingdao}
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tsingdao}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
      - ../database:/workspace-database:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tsingdao}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  frontend_node_modules: